# =============================================================================
# TOMOYO Web Manager — reverse proxy nginx (terminaison HTTPS)
#
# Installation :
#   sudo cp docs/nginx-tomoyo-web-manager.conf /etc/nginx/sites-available/tomoyo-web-manager
#   sudo ln -s /etc/nginx/sites-available/tomoyo-web-manager /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Puis obtenez un certificat avec certbot (voir docs/DEPLOIEMENT.md) :
#   sudo certbot --nginx -d votre-domaine.example
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name votre-domaine.example;

    # certbot ajoutera ici automatiquement un bloc de redirection HTTPS
    # et la configuration du certificat (server { listen 443 ssl; ... }).

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # L'appli ferme la connexion apres chaque reponse
        # (Connection: close) ; conserver ce comportement cote proxy.
        proxy_set_header Connection "";
    }

    client_max_body_size 256k;
}
